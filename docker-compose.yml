# version: '3'
services:
  web:
    build: .
    image: rails_template:latest
    command: bundle exec rails s -p 3000 -b '0.0.0.0'
    ports:
      - '80:3000'
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=$${SECRET_KEY_BASE} # $をescapeするために$を追加
      - DATABASE_URL=$${DATABASE_URL} # $をescapeするために$を追加
